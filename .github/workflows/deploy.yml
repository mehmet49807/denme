name: Deploy to cPanel

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      target:
        description: Deploy hedefi
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - admin
      sync_mode:
        description: Sync modu
        required: true
        default: delta
        type: choice
        options:
          - delta
          - full

concurrency:
  group: deploy-gonulkoprusu
  cancel-in-progress: false

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Gerekli secret'lar tanımlı mı?
        env:
          FTP_WEB_USER: ${{ secrets.FTP_WEB_USER }}
          FTP_WEB_PASSWORD: ${{ secrets.FTP_WEB_PASSWORD }}
          FTP_ADMIN_USER: ${{ secrets.FTP_ADMIN_USER }}
          FTP_ADMIN_PASSWORD: ${{ secrets.FTP_ADMIN_PASSWORD }}
        run: |
          missing=0
          for name in FTP_WEB_USER FTP_WEB_PASSWORD FTP_ADMIN_USER FTP_ADMIN_PASSWORD; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              echo "::error::Eksik GitHub Secret: $name"
              echo "Kurulum: cp .env.deploy.example .env.deploy && bash scripts/setup/github-deploy-setup.sh"
              missing=1
            fi
          done
          exit $missing

  deploy-web:
    needs: check-secrets
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'web'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate deploy patch scripts
        run: |
          python3 scripts/deploy/generate-web-admin-github-patch.py
          python3 scripts/deploy/generate-web-admin-nav-patch.py
          python3 scripts/deploy/generate-web-admin-fix-layout-patch.py
          python3 scripts/deploy/generate-web-admin-nav-partial-patch.py
          python3 scripts/deploy/generate-web-admin-read-file-patch.py
          python3 scripts/deploy/generate-web-admin-restore-routes-patch.py
          python3 scripts/deploy/generate-web-google-profile-patch.py

      - name: Hazırla delta sync listesi
        id: sync
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.sync_mode }}" = "full" ]; then
            echo "full=1" >> "$GITHUB_OUTPUT"
            echo "Deploy modu: full"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "full=1" >> "$GITHUB_OUTPUT"
              echo "İlk push / before yok → full sync"
            else
              git diff --name-only "$BEFORE" "${{ github.sha }}" > /tmp/changed-files.txt
              echo "changed_file=/tmp/changed-files.txt" >> "$GITHUB_OUTPUT"
              echo "Delta dosyalar:"
              cat /tmp/changed-files.txt || true
            fi
          else
            echo "changed_file=/tmp/changed-files.txt" >> "$GITHUB_OUTPUT"
            git diff --name-only HEAD~1 HEAD > /tmp/changed-files.txt || true
            echo "Manuel delta (son commit):"
            cat /tmp/changed-files.txt || true
          fi

      - name: Deploy web via FTP (delta + parallel)
        env:
          FTP_WEB_USER: ${{ secrets.FTP_WEB_USER }}
          FTP_WEB_PASSWORD: ${{ secrets.FTP_WEB_PASSWORD }}
          SETUP_CACHE_KEY: ${{ secrets.SETUP_CACHE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          FTP_PARALLEL: "4"
          DEPLOY_FULL_SYNC: ${{ steps.sync.outputs.full }}
          DEPLOY_CHANGED_FILES: ${{ steps.sync.outputs.changed_file }}
        run: python3 scripts/deploy/ftp_sync.py web

  deploy-admin:
    needs: check-secrets
    if: github.event_name == 'push' || github.event.inputs.target == 'all' || github.event.inputs.target == 'admin'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hazırla delta sync listesi
        id: sync
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.sync_mode }}" = "full" ]; then
            echo "full=1" >> "$GITHUB_OUTPUT"
            echo "Deploy modu: full"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "full=1" >> "$GITHUB_OUTPUT"
              echo "İlk push / before yok → full sync"
            else
              git diff --name-only "$BEFORE" "${{ github.sha }}" > /tmp/changed-files.txt
              echo "changed_file=/tmp/changed-files.txt" >> "$GITHUB_OUTPUT"
              echo "Delta dosyalar:"
              cat /tmp/changed-files.txt || true
            fi
          else
            echo "changed_file=/tmp/changed-files.txt" >> "$GITHUB_OUTPUT"
            git diff --name-only HEAD~1 HEAD > /tmp/changed-files.txt || true
            echo "Manuel delta (son commit):"
            cat /tmp/changed-files.txt || true
          fi

      - name: Deploy admin via FTP (delta + parallel)
        env:
          FTP_ADMIN_USER: ${{ secrets.FTP_ADMIN_USER }}
          FTP_ADMIN_PASSWORD: ${{ secrets.FTP_ADMIN_PASSWORD }}
          SETUP_CACHE_KEY: ${{ secrets.SETUP_CACHE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          FTP_PARALLEL: "4"
          DEPLOY_FULL_SYNC: ${{ steps.sync.outputs.full }}
          DEPLOY_CHANGED_FILES: ${{ steps.sync.outputs.changed_file }}
        run: python3 scripts/deploy/ftp_sync.py admin
