<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kayıt Ol · Gönül Köprüsü</title>
    <link rel="stylesheet" href="../public/css/theme.css">
    <style>
        .gk-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;background:var(--gk-card);border-bottom:1px solid var(--gk-beige);}
        .gk-nav a{margin-left:18px;font-weight:600;}
        .gk-container{max-width:560px;margin:0 auto;padding:32px;}
    </style>
</head>
<body>
<header class="gk-nav">
    <a href="index.html" class="gk-logo"><span class="gk-mark"></span> Gönül Köprüsü</a>
    <nav><a href="index.html">Giriş</a></nav>
</header>

<div class="gk-container">
    <div class="gk-card">
        <h2 style="margin-top:0;">Aramıza Katılın</h2>
        <div class="gk-field"><label>Kullanıcı Adı (sonradan değiştirilemez)</label><input class="gk-input" placeholder="kullaniciadi"></div>
        <div class="gk-row">
            <div class="gk-field"><label>Ad</label><input class="gk-input" placeholder="Adınız"></div>
            <div class="gk-field"><label>Soyad</label><input class="gk-input" placeholder="Soyadınız"></div>
        </div>
        <div class="gk-field"><label>E-posta</label><input class="gk-input" placeholder="ornek@eposta.com"></div>
        <div class="gk-field"><label>Telefon</label><input class="gk-input" placeholder="+90 5xx xxx xx xx"></div>
        <div class="gk-row">
            <div class="gk-field"><label>Cinsiyet</label><select class="gk-select"><option>Kadın</option><option>Erkek</option></select></div>
            <div class="gk-field"><label>Şehir</label><input class="gk-input" placeholder="İl"></div>
            <div class="gk-field"><label>İlçe</label><input class="gk-input" placeholder="İlçe"></div>
        </div>
        <div class="gk-row">
            <div class="gk-field"><label>Şifre</label><input class="gk-input" type="password" value="123456"></div>
            <div class="gk-field"><label>Şifre Tekrar</label><input class="gk-input" type="password" value="123456"></div>
        </div>
        <button class="gk-btn" style="width:100%;">Kayıt Ol</button>
    </div>
</div>
</body>
</html>
